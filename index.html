<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context-Aware Vegetarian Meal Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <h1><i class="ri-leaf-line"></i> V-Planner</h1>
            <p>Your context-aware vegetarian meal guide</p>
        </header>

        <div class="glass-panel form-section" id="formSection">
            <h2>Personalize Your Plan</h2>
            <form id="plannerForm">

                <div class="input-group">
                    <label>Units</label>
                    <div class="toggle-container">
                        <input type="radio" id="unitMetric" name="units" value="metric" checked>
                        <label for="unitMetric">Metric (kg/cm)</label>
                        <input type="radio" id="unitImperial" name="units" value="imperial">
                        <label for="unitImperial">Imperial (lbs/in)</label>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="10" max="120" placeholder="e.g. 30">
                    </div>
                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="weight">Weight (<span id="weightLabel">kg</span>)</label>
                        <input type="number" id="weight" required min="20" max="300" placeholder="e.g. 70" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="height">Height (<span id="heightLabel">cm</span>)</label>
                        <input type="number" id="height" required min="50" max="300" placeholder="e.g. 175" step="0.1">
                    </div>
                </div>

                <div class="input-group">
                    <label for="activity">Activity Level</label>
                    <select id="activity" required>
                        <option value="1.2">Sedentary (little or no exercise)</option>
                        <option value="1.375" selected>Lightly active (light exercise 1-3 days/week)</option>
                        <option value="1.55">Moderately active (moderate exercise 3-5 days/week)</option>
                        <option value="1.725">Very active (hard exercise 6-7 days a week)</option>
                        <option value="1.9">Extra active (very hard exercise/physical job)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="disease">Medical Condition (Optional)</label>
                    <select id="disease">
                        <option value="none">None</option>
                        <option value="Diabetes">Diabetes</option>
                        <option value="Hypertension">Hypertension (High Blood Pressure)</option>
                        <option value="Celiac">Celiac Disease (Gluten-Free)</option>
                    </select>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="country">Country Code</label>
                        <input type="text" id="country" required placeholder="e.g. US, IN, UK" maxlength="2">
                        <small>2-letter ISO code for holidays</small>
                    </div>
                    <div class="input-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required placeholder="e.g. London">
                        <small>For local weather</small>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="generateBtn">
                    <span>Generate Meal Plan</span>
                    <i class="ri-magic-line"></i>
                </button>
            </form>
        </div>

        <div class="glass-panel results-section hidden" id="resultsSection">
            <button id="backBtn" class="btn-icon"><i class="ri-arrow-left-line"></i> Back</button>

            <div class="context-banner">
                <div class="context-item weather-context">
                    <i class="ri-sun-line" id="weatherIcon"></i>
                    <div>
                        <span id="weatherTemp">--°C</span>
                        <small id="weatherDesc">Loading weather...</small>
                    </div>
                </div>
                <div class="context-item festival-context">
                    <i class="ri-calendar-event-line"></i>
                    <div>
                        <span id="festivalName">No Festival Today</span>
                        <small>Local Calendar</small>
                    </div>
                </div>
                <div class="context-item nutrition-context">
                    <i class="ri-fire-line"></i>
                    <div>
                        <span id="targetCalories">-- kcal</span>
                        <small>Daily Target</small>
                    </div>
                </div>
                <div class="context-item nutrition-context" style="border-color: rgba(59, 130, 246, 0.3); background: rgba(59, 130, 246, 0.05);">
                    <i class="ri-body-scan-line" style="color: #3b82f6;"></i>
                    <div>
                        <span id="targetProteinVal">-- g</span>
                        <small>Protein Target</small>
                    </div>
                </div>
                <div class="context-item nutrition-context" style="border-color: rgba(236, 72, 153, 0.3); background: rgba(236, 72, 153, 0.05);">
                    <i class="ri-scales-3-line" style="color: #ec4899;"></i>
                    <div>
                        <span id="bmiVal">--</span>
                        <small id="bmiCategory">BMI Status</small>
                    </div>
                </div>
            </div>

            <div class="meal-plan">
                <!-- Meal cards will be injected here -->
            </div>

            <div class="nutrition-summary">
                <h3>Daily Summary</h3>
                <div class="macros">
                    <div class="macro">
                        <span class="label">Calories</span>
                        <span class="value" id="totalCals">0</span>
                    </div>
                    <div class="macro">
                        <span class="label">Protein</span>
                        <span class="value" id="totalProtein">0g</span>
                    </div>
                    <div class="macro">
                        <span class="label">Carbs</span>
                        <span class="value" id="totalCarbs">0g</span>
                    </div>
                    <div class="macro">
                        <span class="label">Fat</span>
                        <span class="value" id="totalFat">0g</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Template for meal cards -->
    <template id="mealCardTemplate">
        <div class="meal-card">
            <div class="meal-image-placeholder">
                <i class="ri-restaurant-line"></i>
            </div>
            <div class="meal-content">
                <div class="meal-header">
                    <h3 class="meal-type">Breakfast</h3>
                    <div class="meal-tags"></div>
                </div>
                <h4 class="meal-title"></h4>
                <p class="meal-desc"></p>
                <div class="meal-quantity" style="margin-bottom: 0.8rem; color: var(--primary); font-weight: 600; font-size: 0.9rem;">
                    <i class="ri-scales-3-line"></i> Quantity: <span class="m-qty">1</span> Servings
                </div>
                <div class="meal-macros">
                    <span>🔥 <span class="m-cals"></span> kcal</span>
                    <span>🥩 <span class="m-prot"></span>g</span>
                    <span>🌾 <span class="m-carbs"></span>g</span>
                    <span>🧈 <span class="m-fat"></span>g</span>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="meals_db.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>

</html>
